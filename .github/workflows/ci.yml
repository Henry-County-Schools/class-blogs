name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    env:
      INSTRUCTOR_GITHUB_USERS: ${{ vars.INSTRUCTOR_GITHUB_USERS }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate content
        run: pnpm validate:content

      - name: Validate student ownership
        if: github.event_name == 'pull_request'
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: pnpm validate:ownership --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Run Astro checks
        run: pnpm check

      - name: Build site
        run: pnpm build
